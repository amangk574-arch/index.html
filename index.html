<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Galaxy AI | Backend Integrated</title>
    <style>
        body { background: #0b0e14; color: #d1d5db; font-family: 'Segoe UI', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #chat-container { width: 500px; background: #161b22; padding: 25px; border-radius: 10px; border: 1px solid #30363d; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
        h2 { text-align: center; color: #58a6ff; margin-bottom: 20px; }
        #chat-box { height: 320px; overflow-y: auto; border: 1px solid #30363d; padding: 15px; background: #010409; border-radius: 6px; margin-bottom: 15px; }
        .user { color: #ffffff; font-weight: bold; }
        .ai { color: #58a6ff; }
        .status { font-size: 12px; color: #8b949e; font-style: italic; }
        #input-area { display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 4px; }
        button { padding: 10px 20px; background: #238636; border: none; color: white; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>

<div id="chat-container">
    <h2>Galaxy AI v3.0</h2>
    <div id="chat-box">
        <div class="ai">System: Backend Server Connected. Latency: 12ms.</div>
    </div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="Query data...">
        <button onclick="fetchData()">SEND</button>
    </div>
</div>

<script>
    async function fetchData() {
        const input = document.getElementById("user-input");
        const chatBox = document.getElementById("chat-box");
        const query = input.value.trim().toLowerCase();
        if (!query) return;

        chatBox.innerHTML += `<div style="margin-bottom:10px;"><span class="user">User:</span> ${input.value}</div>`;
        input.value = "";

        // Backend Simulation (Fetching process)
        chatBox.innerHTML += `<div class="status" id="loading">Fetching data from backend API...</div>`;
        
        await new Promise(resolve => setTimeout(resolve, 1200));

        // Mock Database - यहाँ आप और डेटा जोड़ सकते हैं
        const database = {
            "what is data entry": "Data entry is the process of digitizing raw data into a structured format for database management systems.",
            "what is api": "An API (Application Programming Interface) allows two distinct software systems to exchange data securely.",
            "status": "System load: 15%. Database connection: Active."
        };

        document.getElementById("loading").remove();
        const response = database[query] || "404 Error: Record not found in the remote backend database.";
        
        chatBox.innerHTML += `<div class="ai" style="margin-bottom:10px;"><b>Galaxy:</b> ${response}</div>`;
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>

</body>
</html>
